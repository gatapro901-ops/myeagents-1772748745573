<!DOCTYPE html><html lang='ar'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>MyEagents</title><link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css'><link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css'><link rel='preconnect' href='https://fonts.googleapis.com'><link rel='preconnect' href='https://fonts.gstatic.com' crossorigin><link href='https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap' rel='stylesheet'><link rel='stylesheet' href='styles.css'><link rel='stylesheet' href='animations.css'></head><body><div class='container mx-auto p-4 pt-6 mt-10'><h1 class='text-3xl font-bold mb-4'>MyEagents</h1><form id='login-form'><input type='password' id='password' placeholder='الباسوورد'><button type='submit' class='bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded'>دخول</button></form><div id='dashboard' class='hidden'><h2 class='text-2xl font-bold mb-4'>لوحة التحكم</h2><button class='bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded' id='groups-btn'>مركز المجموعات</button><button class='bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded' id='agent-btn'>الإيجنت الأكبر</button><button class='bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded' id='secretary-btn'>السيكرتاريا</button><button class='bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded' id='private-ops-btn'>مركز العمليات الخاصه</button><button class='bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded' id='shared-ops-btn'>مركز العمليات المشتركه</button><button class='bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded' id='personal-ops-btn'>مركز العمليات الشخصيه</button></div></div><script src='main.js'></script></body></html>
